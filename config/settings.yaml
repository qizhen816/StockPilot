log_level: INFO

fetcher:
  start_date: "20200101"
  adjust: "qfq"
  retry_attempts: 2
  fallback_sources: ["eastmoney", "tencent"]
  cache_dir: "reports/cache"

indicators:
  sma_periods: [5, 10, 20, 60]
  ema_short_period: 12
  ema_long_period: 26
  macd_signal_period: 9
  rsi_period: 14
  atr_period: 14
  volume_ratio_period: 20
  highest_period: 20
  lowest_period: 20

analyzer:
  trend_short_ma_period: 5
  trend_mid_ma_period: 20
  trend_long_ma_period: 60
  momentum_rsi_lower: 55
  momentum_rsi_upper: 75
  volume_breakout_ratio: 1.3
  risk_rsi_high: 80
  risk_atr_pct_high: 0.08
  support_resistance_period: 20
  shrink_volume_ratio: 0.8
  strong_volume_ratio: 1.2
  breakout_volume_ratio: 1.8
  abnormal_drawdown_pct: -0.05
  long_upper_shadow_ratio: 0.45

scorer:
  trend_weight: 35
  momentum_weight: 15
  volume_weight: 10
  risk_weight: 20
  relative_strength_weight: 20
  reason_confidence_step: 0.04
  minimum_confidence: 0.50
  maximum_confidence: 0.95

report:
  output_dir: "reports/daily"
  history_csv: "reports/history.csv"

summary:
  watchlist_limit: 3
  high_risk_levels: ["High"]

scanner:
  candidate_limit: 5
  min_score: 70
  allowed_risk_levels: ["Low", "Medium"]
  required_trend: "Bullish"
  min_relative_strength_score: 60
  min_volume_statuses: ["Normal", "Strong", "Breakout"]

decision:
  high_score_threshold: 80
  low_score_threshold: 55
  high_confidence_threshold: 0.75
